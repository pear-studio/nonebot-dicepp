# DicePP CI - Test and Compatibility Checks
#
# This workflow runs on every push and pull request to ensure:
# 1. All unit tests pass
# 2. Compatibility corpus achieves 100% pass rate (required for AST engine migration)

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install ".[dev]"
      
      - name: Run unit tests
        run: |
          uv run pytest -m unit --tb=short -q
      
      - name: Run compatibility corpus tests
        run: |
          # This is a required gate - compatibility corpus must achieve 100% pass
          uv run pytest tests/module/roll/test_compatibility_corpus.py -v --tb=short
        env:
          # Fail fast on any compatibility test failure
          PYTEST_FAIL_FAST: "1"

  compatibility-gate:
    name: Compatibility Gate (100% Required)
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install ".[dev]"
      
      - name: Verify compatibility corpus (strict)
        run: |
          # This job explicitly validates 100% compatibility requirement
          # Any failure here blocks the PR/merge
          echo "Running compatibility corpus with strict validation..."
          uv run pytest tests/module/roll/test_compatibility_corpus.py \
            -v \
            --tb=long \
            -x \
            2>&1 | tee corpus_results.txt
          
          # Check results
          if grep -q "FAILED" corpus_results.txt; then
            echo "::error::Compatibility corpus has FAILED tests. 100% pass rate required."
            exit 1
          fi
          
          echo "::notice::Compatibility corpus passed! 100% compatibility maintained."
