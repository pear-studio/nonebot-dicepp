version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime        # 仅使用精简的运行阶段镜像
    image: dicepp:latest
    container_name: dicepp_nonebot_bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
      - .env.linux
    environment:
      - ENVIRONMENT=linux
      - APP_MODULE=bot:app
      - SECRET
      - ACCESS_TOKEN
      - MAX_WORKERS=1
    volumes:
      # 持久化插件数据（用户数据、数据库等）
      - dicepp_data:/app/src/plugins/DicePP/data
    healthcheck:
      test: ["CMD", "python", "-c", "import psutil; exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  dicepp_data:
    name: dicepp_data