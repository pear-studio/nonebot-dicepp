version: "3"

services:
  bot:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: dicepp_nonebot_bot
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ../.env
      - ../.env.linux
    environment:
      - ENVIRONMENT=linux
      - APP_MODULE=bot:app
      - SECRET=${SECRET}
      - ACCESS_TOKEN=${ACCESS_TOKEN}
      - MAX_WORKERS=1
    volumes:
      - ../:/app
      - ../src/plugins/DicePP/data:/app/src/plugins/DicePP/data
    networks:
      - dice-net

networks:
  dice-net:
    external: true
